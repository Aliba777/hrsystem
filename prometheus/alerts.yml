# Prometheus Alert Rules for HR Connect
# Defines conditions for firing alerts

groups:
  - name: system_alerts
    interval: 15s
    rules:
      # CPU Usage Alert - WARNING when > 80% for 5 minutes
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          component: cpu
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% on {{ $labels.instance }} (current: {{ $value | humanize }}%)"

      # Memory Usage Alert - CRITICAL when > 90% for 5 minutes
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
          component: memory
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is above 90% on {{ $labels.instance }} (current: {{ $value | humanize }}%)"

      # Disk Usage Alert - WARNING when > 85%
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 85
        for: 2m
        labels:
          severity: warning
          component: disk
        annotations:
          summary: "High disk usage detected"
          description: "Disk usage is above 85% on {{ $labels.instance }} at {{ $labels.mountpoint }} (current: {{ $value | humanize }}%)"

      # Service Down Alert - CRITICAL when service is down for 1 minute
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Service is down"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} is down"

      # High Load Average Alert - WARNING when load > CPU count
      - alert: HighLoadAverage
        expr: node_load5 > count(node_cpu_seconds_total{mode="idle"}) without(cpu, mode)
        for: 5m
        labels:
          severity: warning
          component: load
        annotations:
          summary: "High load average detected"
          description: "5-minute load average is {{ $value | humanize }} on {{ $labels.instance }}"
