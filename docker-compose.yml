version: '3.8'

services:

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: my_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: arlan
      PMA_PASSWORD: password
    depends_on:
      - db

  web:
    build: .
    container_name: my_php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/
      - backup_data:/var/backups/hr_connect
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-hr_connect}
      - DB_USER=${DB_USER:-arlan}
      - DB_PASS=${DB_PASS:-password}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

  db:
    image: mysql:8.0
    container_name: my_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hr_connect
      MYSQL_USER: arlan
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  backup_data:
